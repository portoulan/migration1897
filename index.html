<link rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylineDecorator.min.js"></script>
<title>Неместные урожкенцы 1897г.</title>

<div id="map"></div>

<style>
#map {
    height: 100vh;
    width: 100%;
}
</style>

<script>     

const map = L.map('map').setView([60, 90], 3);

L.tileLayer(
    'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution:'© OpenStreetMap'
    }
).addTo(map);

let migrationData = [];
let maxNumber = 0;

const regionCenters = {};

const arrowsLayer = L.layerGroup().addTo(map);
      
Papa.parse('Migration.csv', {
    download: true,
    header: true,
    delimiter: ';',
    dynamicTyping: true,

    complete: function(results){

        migrationData = results.data.filter(
            row =>
                row.Origin &&
                row.Destination &&
                row.Number
        );

        maxNumber = Math.max(
            ...migrationData.map(
                row => Number(row.Number)
            )
        );

        console.log(
            'Migration rows:',
            migrationData.length
        );
          console.log(
        [...new Set(
            migrationData.map(x => x.Origin)
        )]
    );
    }
});

fetch('data.geojson')
    .then(response => response.json())
    .then(data => {

        L.geoJSON(data, {

            style: {
                color: '#666',
                weight: 1,
                fillColor: '#e5e5e5',
                fillOpacity: 0.7
            },

            onEachFeature

        }).addTo(map);
        console.log(
        Object.keys(regionCenters)
    );

    });

function onEachFeature(feature, layer){

    const region =
        feature.properties.prov_ENG;

    regionCenters[region] =
        layer.getBounds().getCenter();

    layer.on('click', onRegionClick);

    layer.bindTooltip(region);
}
function onRegionClick(e){

    arrowsLayer.clearLayers();

    const destination =
        e.target.feature.properties.prov_ENG;

    const flows =
        migrationData.filter(
            row =>
                row.Destination === destination
        );

    console.log(
        destination,
        flows.length
    );

    flows.forEach(flow => {

        const start =
            regionCenters[flow.Origin];

        const end =
            regionCenters[flow.Destination];

        if(!start || !end){
            console.warn(
                'Region not found:',
                flow.Origin,
                flow.Destination
            );
            return;
        }

        drawArrow(
            start,
            end,
            Number(flow.Number)
        );
    });
}
function drawArrow(
    start,
    end,
    value
){

    const weight =
        1 + 9 * value / maxNumber;

    const line =
        L.polyline(
            [start, end],
            {
                color: '#d32f2f',
                weight: weight,
                opacity: 0.8
            }
        );

    arrowsLayer.addLayer(line);

    const decorator =
        L.polylineDecorator(
            line,
            {
                patterns: [
                    {
                        offset: '100%',
                        repeat: 0,

                        symbol:
                            L.Symbol.arrowHead({
                                pixelSize:
                                    8 + weight,

                                polygon: true,

                                pathOptions:{
                                    color:'#d32f2f',
                                    fillOpacity:1,
                                    weight:1
                                }
                            })
                    }
                ]
            }
        );

    arrowsLayer.addLayer(
        decorator
    );
}
</script>
