<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя карта</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Создаем карту
    const map = L.map('map').setView([55.7558, 37.6176], 10);

    // Подложка OpenStreetMap
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Маркер
    L.marker([55.7558, 37.6176])
        .addTo(map)
        .bindPopup('Москва')
        .openPopup();
fetch('data.geojson')
  .then(r => r.json())
  .then(data => {
    const layer = L.geoJSON(data).addTo(map);
    map.fitBounds(layer.getBounds());
  });
let migrationData = [];

Papa.parse('Migration.csv', {
    download: true,
    header: true,
    complete: function(results) {
        migrationData = results.data;
    }
});
    
const featureCenters = {};

function onEachFeature(feature, layer) {

    const id = feature.properties.id;

    featureCenters[id] = layer.getBounds().getCenter();

    layer.on('click', onRegionClick);
}
function drawArrow(start, end, weight) {

    const line = L.polyline(
        [start, end],
        {
            color: 'red',
            weight: weight
        }
    ).addTo(map);

    L.polylineDecorator(line, {
        patterns: [{
            offset: '100%',
            repeat: 0,
            symbol: L.Symbol.arrowHead({
                pixelSize: 10 + weight,
                polygon: true
            })
        }]
    }).addTo(map);
}
function onRegionClick(e) {

    const destination =
        e.target.feature.properties.id;

    const flows = migrationData.filter(
        row => row.destination === destination
    );

    flows.forEach(flow => {

        const start =
            featureCenters[flow.origin];

        const end =
            featureCenters[flow.destination];

        if (!start || !end) return;

        const weight =
            Math.max(
                1,
                Number(flow.number) / 50
            );

        drawArrow(start, end, weight);
    });
}
const values = migrationData.map(
    d => Number(d.number)
);

const maxValue = Math.max(...values);

const weight =
    1 + 9 * Number(flow.number) / maxValue;
</script>
</body>
</html>
