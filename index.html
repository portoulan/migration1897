<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя карта</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Создаем карту
    const map = L.map('map').setView([55.7558, 37.6176], 10);

    // Подложка OpenStreetMap
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Маркер
    L.marker([55.7558, 37.6176])
        .addTo(map)
        .bindPopup('Москва')
        .openPopup();
fetch('data.geojson')
  .then(r => r.json())
  .then(data => {
    const layer = L.geoJSON(data).addTo(map);
    map.fitBounds(layer.getBounds());
  });
const point1 = [55.7558, 37.6176]; // Москва
const point2 = [59.9343, 30.3351]; // Санкт-Петербург

// Линия
const line = L.polyline([point1, point2], {
    color: 'red',
    weight: 3
}).addTo(map);

// Наконечник стрелки
L.polylineDecorator(line, {
    patterns: [
        {
            offset: '100%',
            repeat: 0,
            symbol: L.Symbol.arrowHead({
                pixelSize: 15,
                polygon: true,
                pathOptions: {
                    color: 'red',
                    fillOpacity: 1,
                    weight: 2
                }
            })
        }
    ]
}).addTo(map);
</script>

</body>
</html>
