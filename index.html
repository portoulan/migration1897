<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Моя карта</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        #map {
            height: 600px;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Центр карты (Москва)
    const map = L.map('map').setView([55.7558, 37.6176], 10);

    // Слой OpenStreetMap
    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution: '&copy; OpenStreetMap contributors'
        }
    ).addTo(map);

    // Маркер
    L.marker([55.7558, 37.6176])
        .addTo(map)
        .bindPopup('Москва')
        .openPopup();
    L.polyline([
  [55.75, 37.61],
  [55.80, 37.70],
  [55.85, 37.80]
]).addTo(map);
</script>

</body>
</html>
