<link rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylineDecorator.min.js"></script>
<title>Неместные урожкенцы 1897г.</title>

<div id="map"></div>

<style>
#map {
    height: 100vh;
    width: 100%;
}
</style>

<script>
      
const map =
    L.map('map')
     .setView([60, 90], 3);

L.tileLayer(
    'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution:'© OpenStreetMap'
    }
).addTo(map);

let migrationIndex = {};
const regionLayers = {};

Papa.parse('Migration.csv', {
    download: true,
    header: true,
    delimiter: ';',
    dynamicTyping: true,

    complete: function(results){

        results.data.forEach(row => {

            const destination =
                row.Destination?.trim();

            if(!migrationIndex[destination]){
                migrationIndex[destination] = [];
            }

            migrationIndex[destination].push({
                origin: row.Origin.trim(),
                number: Number(row.Number)
            });

        });

        console.log(
    Object.keys(migrationIndex).slice(0,10)
);
    }
});


fetch('data.geojson')
    .then(response => response.json())
    .then(data => {

        L.geoJSON(data, {

            style: {
                color:'#666',
                weight:1,
                fillColor:'#e5e5e5',
                fillOpacity:0.7
            },

            onEachFeature

        }).addTo(map);

        console.log(
    Object.keys(regionLayers).slice(0,10)
);

    });

const regionLayers = {};
function onEachFeature(feature, layer){

    const region =
        feature.properties.prov_ENG;

    regionLayers[region] = layer;

    layer.on('click', onRegionClick);

    layer.bindTooltip(region);
}
function getColor(value, max){

    const k = value / max;

    if(k > 0.8) return '#800026';
    if(k > 0.6) return '#BD0026';
    if(k > 0.4) return '#E31A1C';
    if(k > 0.2) return '#FC4E2A';

    return '#FD8D3C';
}
function resetStyles(){

    Object.values(regionLayers)
        .forEach(layer => {

            layer.setStyle({
                color:'#666',
                weight:1,
                fillColor:'#e5e5e5',
                fillOpacity:0.7
            });

        });
}
function onRegionClick(e){

      const destination =
        e.target.feature.properties.prov_ENG;

    console.log(
        'Clicked:',
        destination
    );

    console.log(
        migrationIndex[destination]
    );

    resetStyles();

    const destination =
        e.target.feature.properties.prov_ENG;

    const flows =
        migrationIndex[destination];

    if(!flows) return;

    const maxNumber =
        Math.max(
            ...flows.map(
                x => x.number
            )
        );

    flows.forEach(flow => {

        const layer =
            regionLayers[flow.origin];

        if(!layer) return;

        layer.setStyle({
            fillColor:
                getColor(
                    flow.number,
                    maxNumber
                ),
            fillOpacity:0.8,
            color:'#444',
            weight:1
        });

    });

    e.target.setStyle({
        fillColor:'yellow',
        fillOpacity:0.9,
        color:'#000',
        weight:3
    });
}

</script>
